name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ap-northeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/weather-roguelite-api:${{ github.sha }} .

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/weather-roguelite-api:${{ github.sha }}

      - name: Register new task definition
        id: register-task-def
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition weather-roguelite-api \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "${{ steps.login-ecr.outputs.registry }}/weather-roguelite-api:${{ github.sha }}" \
            '.containerDefinitions[0].image = $IMAGE
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_def_arn=$NEW_TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Run DB migration
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster weather-roguelite-cluster \
            --task-definition ${{ steps.register-task-def.outputs.task_def_arn }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_ID }}],securityGroups=[${{ secrets.SECURITY_GROUP_ID }}]}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["bundle","exec","rails","db:migrate"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "Failed to start migration task (run-task returned no taskArn)"
            exit 1
          fi

          # デフォルトのタイムアウトは6秒×100回=最大10分。
          # マイグレーションがこれを超える場合は --cli-read-timeout で延長すること。
          aws ecs wait tasks-stopped \
            --cluster weather-roguelite-cluster \
            --tasks $TASK_ARN

          # aws ecs wait tasks-stopped はコンテナが非0終了してもエラーを返さないため、
          # 終了コードを明示的に取得してチェックする。
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster weather-roguelite-cluster \
            --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster weather-roguelite-cluster \
            --service weather-roguelite-api \
            --task-definition ${{ steps.register-task-def.outputs.task_def_arn }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [deploy-backend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ap-northeast-1

      - name: Upload to S3 (assets with long cache)
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000"

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp frontend/dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
